cleanupUnusedCatalogs: true
linkWorkspacePackages: true
preferWorkspacePackages: true

packages:
  - packages/**
  - examples/angular/**
  - examples/react/**
  - examples/preact/**
  - examples/solid/**
  - examples/vue/**
  - examples/lit/**
  - examples/svelte/**

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  sharp: true
  vue-demi: true
  nx: true
  unrs-resolver: true

cleanupUnusedCatalogs: true
linkWorkspacePackages: true
preferWorkspacePackages: true
blockExoticSubdeps: true
trustPolicy: 'no-downgrade'
trustPolicyExclude:
  - 'ua-parser-js@1.0.41 || 0.7.41' # React Native Web & Expo Devices; UAP v2 is not MIT
  - 'chokidar@4.0.3' # Angular via Sass. See https://github.com/angular/angular-cli/pull/33235#issuecomment-4546209387
  - 'semver@6.3.1 || 5.7.2' # Angular Devkit
  - 'hosted-git-info@6.1.3' # Remix Run Dev
  - 'vite@5.4.21' # Remix Run Dev
  - 'react-native-worklets@0.5.1' # Expo 56 fixes this but is too new; upgrade in a few days
  - 'eslint-import-resolver-typescript@3.10.1' # Same as above

# Too young to use currently, upgrade in a few days
overrides: { 'tinyexec': '1.1.2' }

# Keep the Solid-based devtools chain on Solid v1: `@tanstack/devtools` and
# `@tanstack/devtools-ui` import `solid-js/web`, which no longer exists in
# Solid 2. Their `solid-js` peer is `>=1.9.7`, which the 2.0.0-beta.x used by
# solid-form also satisfies, so with auto-install-peers pnpm would resolve the
# devtools' peer to the beta and break any (e.g. React) example that bundles
# them. `@tanstack/react-devtools` (the dependent that pulls in `@tanstack/
# devtools`) declares no solid-js itself, so we pin one to v1 here; that makes
# the `@tanstack/devtools` peer — and its whole Solid subtree — resolve to v1.
packageExtensions:
  '@tanstack/react-devtools':
    dependencies:
      solid-js: '^1.9.9'

packages:
  - packages/**
  - examples/angular/**
  - examples/react/**
  - examples/preact/**
  - examples/solid/**
  - examples/vue/**
  - examples/lit/**
  - examples/svelte/**

allowBuilds:
  # root dependency
  nx: true
  unrs-resolver: false # not directly required for build
  esbuild: true

  # nx, @vitejs/plugin-react-swc, terser-webpack-plugin
  '@swc/core': true

  # @angular/build
  '@parcel/watcher': false # optional dep of @angular/build
  lmdb: false # optional dep of @angular/build
  msgpackr-extract: false # optional dep of @angular/build

  # @tanstack/vue-store
  vue-demi: false # only required for vue 2 support

  # nextJs
  sharp: false # not directly required for build
